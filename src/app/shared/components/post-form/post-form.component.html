<mat-card>
    <mat-card-content>
        <form #postForm="ngForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="title">title</label>
                <input required ngModel name="title" #title="ngModel" type="text" class="form-control">
            </div>
            <div class="form-group">
                <label for="content">content</label>
                <textarea required ngModel name="content" #content="ngModel" rows="5" class="form-control"></textarea>
            </div>
            <div class="form-group">
                <label for="isCompleted">isCompleted</label>
                <select name="isCompleted" required ngModel #isCompleted="ngModel" class="form-control">
                    <option [ngValue]="true">Yes</option>
                    <option [ngValue]="false">No</option>
                </select>
            </div>

            <button *ngIf="!editMode" [disabled]="postForm.invalid" mat-raised-button color="primary" class="w-100">add
                post</button>
            <button (click)="onUpdatePost()" *ngIf="editMode" [disabled]="postForm.invalid" mat-raised-button
                color="primary" class="w-100">update Post</button>

        </form>
    </mat-card-content>
</mat-card>
